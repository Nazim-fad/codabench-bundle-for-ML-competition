version: 2
title: Emergency Audio Event Detection
description: Detect emergency sound events in audio clips and predict their start and end times.
image: logo.png
registration_auto_approve: False  # if True, do not require approval from admin to join the comp

terms: pages/terms.md
pages:
  - title: Participation
    file: pages/participate.md
  - title: Seed
    file: pages/seed.md
  - title: Timeline
    file: pages/timeline.md

tasks:
  - index: 0
    name: Development Task
    description: Train an emergency audio event detector on the provided training data. For each test audio clip, predict the time intervals where an emergency event occurs.
    input_data: dev_phase/input_data/
    reference_data: dev_phase/reference_data/
    ingestion_program: ingestion_program/
    scoring_program: scoring_program/

solutions:
  - index: 0
    tasks:
    - 0
    path: solution/


phases:
  - name: Development Phase
    description: Development phase for model building and validation.
    start: 2025-07-10
    end: 2026-03-31
    tasks:
      - 0

leaderboards:
  - title: Results
    key: main
    columns:
      - title: Test Segment F1
        key: test_segment_f1
        index: 0
        sorting: desc

      - title: Test Segment Precision
        key: test_segment_precision
        index: 1
        sorting: desc

      - title: Test Segment Recall
        key: test_segment_recall
        index: 2
        sorting: desc

      - title: Test Presence F1
        key: test_presence_f1
        index: 3
        sorting: desc

      - title: Test Presence Accuracy
        key: test_presence_accuracy
        index: 4
        sorting: desc

      - title: Private Segment F1
        key: private_test_segment_f1
        index: 5
        sorting: desc
        hidden: True

      - title: Train Time
        key: train_time
        index: 6
        sorting: asc

      - title: Test Time
        key: test_time
        index: 7
        sorting: asc